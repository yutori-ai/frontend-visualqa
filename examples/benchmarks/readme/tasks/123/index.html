<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Details</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f1e8;
            --panel: rgba(255, 252, 248, 0.95);
            --ink: #1f2430;
            --muted: #646d79;
            --line: rgba(31, 36, 48, 0.1);
            --accent: #c84b31;
            --accent-strong: #8b2518;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top right, rgba(200, 75, 49, 0.16), transparent 26%),
                linear-gradient(180deg, #fef9f3 0%, var(--bg) 100%);
        }

        .shell {
            width: min(1180px, calc(100% - 40px));
            margin: 24px auto;
            padding: 28px;
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 22px 56px rgba(31, 36, 48, 0.12);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.8fr);
            gap: 24px;
        }

        .panel {
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3.1rem);
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .meta-grid {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }

        .meta-card {
            padding: 16px 18px;
            border-radius: 18px;
            background: #fffaf3;
            border: 1px solid var(--line);
        }

        .save-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-top: 28px;
        }

        .save-button {
            border: none;
            border-radius: 18px;
            padding: 15px 22px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: white;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }

        .sidebar-title {
            margin: 0 0 16px;
            font-size: 1.1rem;
        }

        .sidebar-nav {
            display: grid;
            gap: 10px;
        }

        .sidebar-nav a {
            display: block;
            padding: 12px 14px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--ink);
            background: rgba(31, 36, 48, 0.05);
            font-weight: 700;
        }

        @media (max-width: 880px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="layout">
            <section class="panel">
                <h1>Task Details</h1>
                <p>The task detail route should satisfy the README claim set without extra scrolling.</p>

                <div class="meta-grid">
                    <div class="meta-card">
                        <strong>Status</strong>
                        <p>Needs review</p>
                    </div>
                    <div class="meta-card">
                        <strong>Owner</strong>
                        <p>Visual QA</p>
                    </div>
                </div>

                <div class="save-row">
                    <p>Edits are staged locally and ready to save.</p>
                    <button class="save-button" type="button">Save</button>
                </div>
            </section>

            <aside class="panel" aria-label="Activity sidebar">
                <h2 class="sidebar-title">Activity</h2>
                <nav class="sidebar-nav">
                    <a href="#scouts">Scouts</a>
                    <a href="#findings">Findings</a>
                    <a href="#settings">Settings</a>
                </nav>
            </aside>
        </div>
    </main>
</body>
</html>
