<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Board</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eff3f7;
            --panel: rgba(255, 255, 255, 0.92);
            --ink: #182433;
            --muted: #5a6678;
            --line: rgba(24, 36, 51, 0.1);
            --accent: #b24d1b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f9fbfd 0%, var(--bg) 100%);
            color: var(--ink);
        }

        .shell {
            width: min(1120px, calc(100% - 40px));
            margin: 28px auto;
            padding: 28px;
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 24px 60px rgba(24, 36, 51, 0.12);
        }

        .title-row {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 24px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
        }

        .task-list {
            display: grid;
            gap: 16px;
            margin-top: 28px;
        }

        .task-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: center;
            padding: 18px 20px;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: white;
            width: 100%;
            color: inherit;
            text-align: left;
            font: inherit;
            cursor: pointer;
        }

        .task-row strong {
            display: block;
            margin-bottom: 6px;
            font-size: 1.05rem;
        }

        .status {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(178, 77, 27, 0.1);
            color: var(--accent);
            font-weight: 800;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        .row-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .detail-link {
            color: var(--accent);
            font-weight: 700;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(24, 36, 51, 0.48);
        }

        .modal-backdrop[data-open="true"] {
            display: flex;
        }

        .modal {
            width: min(560px, 100%);
            padding: 24px;
            border-radius: 24px;
            background: white;
            box-shadow: 0 24px 56px rgba(24, 36, 51, 0.24);
        }

        .modal-header {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 18px;
        }

        .modal h2 {
            margin: 0 0 8px;
            font-size: 1.7rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 22px;
        }

        .close-button {
            border: none;
            border-radius: 16px;
            padding: 12px 16px;
            background: rgba(24, 36, 51, 0.08);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="title-row">
            <div>
                <h1>Task Queue</h1>
                <p>Click the first task row to move from the list view into the task detail view.</p>
            </div>
            <a href="../index.html">Back home</a>
        </div>

        <section class="task-list" aria-label="Task list">
            <button class="task-row" id="open-edit-modal" type="button">
                <span>
                    <strong>Landing page polish</strong>
                    <span>Owner: Visual QA · Click to open the edit modal from the list view.</span>
                </span>
                <span class="status">Edit</span>
            </button>
            <div class="row-footer">
                <a class="detail-link" href="./123/">Open the task detail page</a>
            </div>
            <a class="task-row" href="./124/">
                <span>
                    <strong>Sidebar spacing fix</strong>
                    <span>Secondary route for list realism.</span>
                </span>
                <span class="status">Watch</span>
            </a>
        </section>
    </main>

    <div class="modal-backdrop" id="modal-backdrop" data-open="false">
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <div>
                    <h2 id="modal-title">Edit Task</h2>
                    <p>The modal title is intentionally direct so README-style claim checks can ground cleanly.</p>
                </div>
                <button class="close-button" id="close-modal" type="button" aria-label="Close dialog">Close</button>
            </div>

            <div class="modal-actions">
                <button class="close-button" type="button">Save Draft</button>
            </div>
        </section>
    </div>

    <script>
        const openModal = document.getElementById("open-edit-modal");
        const closeModal = document.getElementById("close-modal");
        const backdrop = document.getElementById("modal-backdrop");

        function setOpen(isOpen) {
            backdrop.dataset.open = String(isOpen);
        }

        openModal.addEventListener("click", () => setOpen(true));
        closeModal.addEventListener("click", () => setOpen(false));
        backdrop.addEventListener("click", (event) => {
            if (event.target === backdrop) {
                setOpen(false);
            }
        });
    </script>
</body>
</html>
