<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signup Flow</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eef6ff;
            --ink: #1b2432;
            --muted: #5c6878;
            --line: rgba(27, 36, 50, 0.12);
            --accent: #1a75d2;
            --accent-strong: #0d4f94;
            --success: #0d8d63;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(26, 117, 210, 0.18), transparent 28%),
                linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
            color: var(--ink);
        }

        .shell {
            width: min(760px, calc(100% - 32px));
            margin: 36px auto;
            padding: 28px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 24px 60px rgba(27, 36, 50, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3rem);
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        form,
        .success-card {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }

        label {
            display: grid;
            gap: 8px;
            font-weight: 700;
        }

        input {
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 16px;
            font: inherit;
            background: white;
        }

        button {
            border: none;
            border-radius: 18px;
            padding: 15px 20px;
            font: inherit;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            cursor: pointer;
        }

        .success-card {
            display: none;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(13, 141, 99, 0.1);
        }

        .success-card[data-visible="true"] {
            display: grid;
        }
    </style>
</head>
<body>
    <main class="shell">
        <h1>Create your account</h1>
        <p>This mirrors the dev-browser style prompt: verify that the signup flow reaches a visible success state.</p>

        <form id="signup-form">
            <label>
                Name
                <input id="name-input" name="name" placeholder="Avery Chen" value="Avery Chen">
            </label>
            <label>
                Email
                <input id="email-input" name="email" placeholder="avery@example.com" value="avery@example.com">
            </label>
            <button id="submit-button" type="submit">Create account</button>
        </form>

        <section class="success-card" id="success-card" data-visible="false" aria-live="polite">
            <strong>Account created</strong>
            <p>Welcome aboard. Your workspace is ready.</p>
        </section>
    </main>

    <script>
        const form = document.getElementById("signup-form");
        const successCard = document.getElementById("success-card");

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            successCard.dataset.visible = "true";
        });
    </script>
</body>
</html>
