name: Open PR

on:
  push:
    branches: ['claude/gifted-goldberg-DYoAr']

jobs:
  pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          gh pr list --head claude/gifted-goldberg-DYoAr --state open --json number -q '.[0].number' > /tmp/pr_num || true
          if [ -s /tmp/pr_num ] && [ "$(cat /tmp/pr_num)" != "" ]; then
            echo "PR already exists: $(cat /tmp/pr_num)"
          else
            gh pr create \
              --title "Add missing CHANGELOG entry for 0.7.0" \
              --base main \
              --head claude/gifted-goldberg-DYoAr \
              --body "## Summary

          Add CHANGELOG.md entry for version 0.7.0 documenting the manage_browser login feature.

          ## What drifted

          Version 0.7.0 was bumped in ec4b2e6 after manage_browser(action=login) landed in d2d6d4c (#29), but no CHANGELOG entry was added.

          ## Test plan

          - [x] Verified version is 0.7.0
          - [x] New entry accurately reflects #29 changes"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
