name: Visual QA — Example Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  visualqa-tests:
    name: Visual QA (frontend-visualqa)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      YUTORI_TESTING_API_KEY: ${{ secrets.YUTORI_TESTING_API_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Configure Yutori API key
        run: |
          if [ -z "$YUTORI_TESTING_API_KEY" ]; then
            echo "::error::YUTORI_TESTING_API_KEY secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          mkdir -p ~/.yutori
          python3 -c "import json, os; open(os.path.expanduser('~/.yutori/config.json'), 'w').write(json.dumps({'api_key': os.environ['YUTORI_TESTING_API_KEY']}))"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install frontend-visualqa
        run: |
          uv tool install 'frontend-visualqa>=0.3.21' \
            --with-executables-from playwright
          playwright install chromium --with-deps

      - name: Start example server and wait for readiness
        run: |
          python3 -m http.server 8000 -d examples &
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/yutori_login.html > /dev/null 2>&1; then
              echo "Server ready on :8000 (attempt $i)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Example server failed to start on port 8000"
          exit 1

      # ── Login page — unauthenticated claims ──

      - name: Visual QA — Login page elements
        run: |
          set -o pipefail
          frontend-visualqa verify http://localhost:8000/yutori_login.html \
            --claims \
            'The page shows a "Log in to Yutori Platform" heading' \
            'There is an email input field with placeholder text' \
            'A "Continue" button is visible below the password field' \
            'The left panel shows "Stay ahead on what matters most" heading' \
            --run-timeout-seconds 180 \
            --reporter native --reporter ctrf | tee visualqa-login-elements.json

      - name: Visual QA — Login form validation
        run: |
          set -o pipefail
          frontend-visualqa verify http://localhost:8000/yutori_login.html \
            --claims \
            'The email field shows "Please enter a valid email address" after submitting the empty form' \
            --navigation-hint 'The grayed text in the fields is placeholder, not real input. Click the Continue button immediately without typing anything.' \
            --max-steps-per-claim 15 \
            --run-timeout-seconds 120 \
            --reporter native --reporter ctrf | tee visualqa-login-validation.json

      # ── Dashboard — login once, verify claims without re-navigating ──
      # The navigation hint applies to claim 1 (login). Claims 2-3 run on the
      # already-loaded dashboard thanks to --no-reset-between-claims. Navigator correctly
      # ignores the hint for claims that don't need it.

      - name: Visual QA — Login and verify dashboard
        run: |
          set -o pipefail
          exit_code=0
          frontend-visualqa verify http://localhost:8000/yutori_login.html \
            --no-reset-between-claims \
            --claims \
            'After logging in, the dashboard shows "Welcome back, Developer"' \
            'The API Calls Today stat card shows the value 1,247' \
            'The Monthly Quota progress bar fill matches the percentage shown in the label' \
            --navigation-hint 'Type "test@yutori.com" in the email field, type "password123" in the password field, then click Continue. Wait for the dashboard to load.' \
            --max-steps-per-claim 20 \
            --claim-timeout-seconds 180 \
            --run-timeout-seconds 300 \
            --reporter native --reporter ctrf | tee visualqa-dashboard.json \
            || exit_code=$?

          # Claims 1-2 should pass, claim 3 (progress bar bug) should fail
          if [ "$exit_code" -eq 0 ]; then
            echo "::error::All claims passed — the progress bar bug may have been fixed or the check is broken"
            exit 1
          fi

          if [ ! -s visualqa-dashboard.json ]; then
            echo "::error::No output produced — frontend-visualqa may have crashed"
            exit 1
          fi

          python3 -c "
          import json, sys
          d = json.load(open('visualqa-dashboard.json'))
          results = d.get('results', [])
          if not results:
              print('::error::No results in output'); sys.exit(1)
          passed = [r for r in results if r.get('status') == 'passed']
          failed = [r for r in results if r.get('status') == 'failed']
          if len(passed) < 2:
              print(f'::error::Expected 2+ passing claims, got {len(passed)}'); sys.exit(1)
          if not failed:
              print('::error::No failed claims — progress bar bug not detected'); sys.exit(1)
          print(f'OK: {len(passed)} passed, {len(failed)} failed (progress bar bug detected)')
          "

      # ── Upload artifacts ──

      - name: Upload visual QA artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: visualqa-results
          path: |
            artifacts/
            visualqa-*.json
          retention-days: 7

      # Separate artifact for CI tools that only consume CTRF format
      - name: Upload CTRF reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: visualqa-ctrf-reports
          path: artifacts/**/ctrf-report.json
          retention-days: 7
